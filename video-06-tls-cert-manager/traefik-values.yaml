service:
  type: LoadBalancer
ingressClass:
  enabled: true
ingressRoute:
  dashboard:
    enabled: true
api:
  dashboard: true
  insecure: true
ports:
  traefik:
    port: 9000
    expose:
      default: false
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  ssh:
    port: 2222
    expose:
      default: true
    exposedPort: 22
    protocol: TCP
providers:
  kubernetesIngress:
    publishedService:
      enabled: true

