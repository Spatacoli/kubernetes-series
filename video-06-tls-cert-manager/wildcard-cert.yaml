  # wildcard-cert.yaml
  apiVersion: cert-manager.io/v1
  kind: Certificate
  metadata:
    name: spatacoli-xyz-wildcard
    namespace: traefik
  spec:
    secretName: spatacoli-xyz-tls
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer
    dnsNames:
      - spatacoli.xyz
      - "*.spatacoli.xyz"
