  # gitea-ingress.yaml
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: gitea-ingress
    namespace: gitea
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
  spec:
    ingressClassName: traefik
    rules:
      - host: gitea.spatacoli.xyz
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: gitea
                  port:
                    number: 3000
